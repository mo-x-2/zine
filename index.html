<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <!-- スマホで正しく表示するための設定（拡大縮小を禁止し、画面いっぱいに表示） -->
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no"
    />
    <title>ZINE WebAR</title>

    <!--
      ============================================================
      ライブラリの読み込み
      ============================================================
      ・A-Frame      … 3D/AR空間を作るためのライブラリ
      ・MindAR (image版) … 印刷した写真を認識するためのARライブラリ
      ※インターネット接続があれば、下記CDNから自動で読み込まれます。
    -->
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

    <style>
      /* 画面いっぱいに表示し、余白やスクロールを消す */
      html,
      body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
      }

      /*
        「タップして開始」ボタンのスタイル。
        モバイルブラウザでは、ユーザーが一度画面をタップしないと
        音声付き動画を再生できないルール（Autoplayポリシー）があるため、
        最初にこのボタンを表示して、タップしてもらいます。
      */
      #startOverlay {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: 9999;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        background: rgba(0, 0, 0, 0.85);
        color: #fff;
        font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", sans-serif;
        text-align: center;
        cursor: pointer;
      }

      #startOverlay h1 {
        font-size: 1.4rem;
        margin: 0 0 0.5rem;
      }

      #startOverlay p {
        font-size: 0.95rem;
        margin: 0.3rem 1.5rem;
        line-height: 1.6;
        opacity: 0.85;
      }

      #startButton {
        margin-top: 1.5rem;
        padding: 0.9rem 2.4rem;
        font-size: 1.1rem;
        border: none;
        border-radius: 999px;
        background: #ffffff;
        color: #000;
        cursor: pointer;
      }
    </style>
  </head>

  <body>
    <!--
      ============================================================
      スタート画面（タップして開始）
      ============================================================
      この画面をタップすると、カメラが起動してARが始まります。
      （音声再生の許可を得るために必要な手順です）
    -->
    <div id="startOverlay">
      <h1>ZINE WebAR</h1>
      <p>ZINE（冊子）の写真にカメラをかざすと<br />当時の動画が再生されます。</p>
      <p>はじめにカメラの使用を許可してください。</p>
      <button id="startButton">タップして開始</button>
    </div>

    <!--
      ============================================================
      動画素材の置き場所（画面には表示しない隠しコンテナ）
      ============================================================
      ▼▼▼ 再生したい動画ファイルを変更したい場合は src を書き換えてください ▼▼▼
        1つ目の写真 → ./mov/movie1.mp4 （id="zineVideo1"）
        2つ目の写真 → ./mov/movie2.mp4 （id="zineVideo2"）
      ※ movie1.mp4 / movie2.mp4 は、ユーザーが用意する「再生する動画ファイル」です。

      【重要】カメラ起動の安定化のため、動画は A-Frame の <a-assets> の外に置いています。
        <a-assets> に入れると「動画を全部読み込むまでシーン（カメラ）が始まらない」ため、
        大きな動画があるとカメラ起動が遅延・失敗しやすくなります。これを避ける構成です。

      ・preload="none" … ページ表示時に動画を先読みしない（カメラ取得とリソースを奪い合わない）
                         → 写真を認識したタイミングで初めて読み込み＆再生します
      ・playsinline / webkit-playsinline … 動画を全画面にせず、その場で再生する
      ・muted … 最初は「消音」。写真を認識した瞬間に JavaScript で音を出します
      ・loop … 繰り返し再生（不要なら削除してください）
    -->
    <div style="position: absolute; width: 0; height: 0; overflow: hidden;" aria-hidden="true">
      <video
        id="zineVideo1"
        src="./mov/movie1.mp4"
        preload="none"
        loop
        muted
        playsinline
        webkit-playsinline
        crossorigin="anonymous"
      ></video>
      <video
        id="zineVideo2"
        src="./mov/movie2.mp4"
        preload="none"
        loop
        muted
        playsinline
        webkit-playsinline
        crossorigin="anonymous"
      ></video>
    </div>

    <!--
      ============================================================
      ARシーン本体
      ============================================================
      mindar-image の imageTargetSrc に、コンパイル済みのマーカーファイルを指定します。
      ▼▼▼ マーカーファイルを変更したい場合はここを書き換えてください ▼▼▼
        imageTargetSrc: ./target/targets.mind
      ※ targets.mind は、ユーザーが用意する「コンパイル済みのARマーカーファイル」です。
      ※【重要】複数の写真を使う場合は、1枚ずつ別ファイルにせず、
        写真をすべて “同時にアップロード” して1つの .mind にまとめてコンパイルしてください。
        アップロードした順番が、下の targetIndex（0, 1, ...）に対応します。
          1枚目にアップした写真 → targetIndex: 0 → movie1
          2枚目にアップした写真 → targetIndex: 1 → movie2
        （MindARは imageTargetSrc に1ファイルしか指定できないため、
          target1.mind と target2.mind のように分けると2枚目は認識されません）

      ・autoStart: false … 起動タイミングを自分で制御するため、自動開始はオフにしています
                          （「タップして開始」ボタンが押されてから開始します）
      ・vr-mode-ui="enabled: false" … 不要なVRボタンなどのUIを非表示にします
    -->
    <a-scene
      mindar-image="imageTargetSrc: ./target/targets.mind; autoStart: false; uiScanning: yes;"
      color-space="sRGB"
      embedded
      renderer="colorManagement: true, physicallyCorrectLights"
      vr-mode-ui="enabled: false"
      device-orientation-permission-ui="enabled: false"
    >
      <!-- ARで使うカメラ（ユーザーが操作する視点） -->
      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <!--
        マーカー（写真）を認識したときに、その上に表示する内容のまとまり。
        mindar-image-target="targetIndex: N" は「.mindファイル内のN番目の画像」を意味します。
        ・targetIndex: 0 → コンパイル時に1番目に登録した写真
        ・targetIndex: 1 → コンパイル時に2番目に登録した写真
        ※ 写真を増やしたい場合は、複数枚をまとめて1つの .mind にコンパイルし、
          下記の <a-entity> を同じ要領でコピーして targetIndex を増やしてください。

        各 <a-video> の data-video には、対応する動画素材のidを指定しています
        （JavaScript側でこの値を見て再生する動画を切り替えます）。
      -->

      <!-- 1つ目の写真（targetIndex: 0）→ movie1.mp4 を再生 -->
      <a-entity class="ar-target" mindar-image-target="targetIndex: 0">
        <!--
          写真の上にぴったり重ねて再生する動画。
          ・src / data-video … 上で定義した動画素材(#zineVideo1)を指定
          ・width / height … 動画のアスペクト比。要件どおり 4:3（1 : 0.75）に設定。
                            動画の比率が16:9などの場合は、ここを調整してください
                            （例：16:9なら width="1" height="0.5625"）
          ・position="0 0 0" … マーカーの中心に配置
          ・visible="false" … 最初は非表示。写真を認識したら表示します
        -->
        <a-video
          class="ar-video"
          src="#zineVideo1"
          data-video="zineVideo1"
          width="1"
          height="0.75"
          position="0 0 0"
          rotation="0 0 0"
          visible="false"
          material="transparent: true; opacity: 0"
          scale="0.7 0.7 0.7"
          animation__zoom="property: scale; from: 0.7 0.7 0.7; to: 1 1 1; dur: 1000; easing: easeOutBack; startEvents: arshow"
          animation__fade="property: material.opacity; from: 0; to: 1; dur: 1000; easing: easeOutQuad; startEvents: arshow"
        ></a-video>
      </a-entity>

      <!-- 2つ目の写真（targetIndex: 1）→ movie2.mp4 を再生 -->
      <a-entity class="ar-target" mindar-image-target="targetIndex: 1">
        <a-video
          class="ar-video"
          src="#zineVideo2"
          data-video="zineVideo2"
          width="1"
          height="0.75"
          position="0 0 0"
          rotation="0 0 0"
          visible="false"
          material="transparent: true; opacity: 0"
          scale="0.7 0.7 0.7"
          animation__zoom="property: scale; from: 0.7 0.7 0.7; to: 1 1 1; dur: 600; easing: easeOutBack; startEvents: arshow"
          animation__fade="property: material.opacity; from: 0; to: 1; dur: 600; easing: easeOutQuad; startEvents: arshow"
        ></a-video>
      </a-entity>
    </a-scene>

    <script>
      // =====================================================================
      //  JavaScript：ARの起動制御 ＆ 動画の再生／停止ロジック
      // =====================================================================

      // ページ内の各要素を取得しておく
      const startOverlay = document.querySelector("#startOverlay"); // スタート画面
      const startButton = document.querySelector("#startButton"); // 開始ボタン
      const sceneEl = document.querySelector("a-scene"); // ARシーン
      const targetEntities = document.querySelectorAll(".ar-target"); // マーカーを認識する対象（複数）

      // ---------------------------------------------------------------------
      // 1. 「タップして開始」ボタンが押されたらARをスタートする
      //    （ユーザーのタップを受けて起動することで、音声再生の許可が得られます）
      //
      //    カメラ起動が不安定になりやすいので、次の4つの安定化対策を入れています：
      //    (1) 動画の先読みを止める（HTML側 preload="none"）→ カメラ取得とリソースが競合しない
      //    (2) ボタンの多重タップを防ぐ（start の同時呼び出しはカメラ取得失敗の原因）
      //    (3) シーンの初期化完了を待ってから start を呼ぶ
      //    (4) カメラ取得に失敗したら自動でリトライする
      // ---------------------------------------------------------------------

      // 起動状態を管理するフラグ（多重起動・連打を防ぐため）
      let isStarting = false; // 起動処理の実行中か
      let isStarted = false; // すでに起動成功済みか

      // 指定ミリ秒だけ待つための小さなヘルパー
      const wait = (ms) => new Promise((resolve) => setTimeout(resolve, ms));

      // (3) A-Frameシーンの初期化完了を待つ
      const waitForSceneReady = () =>
        new Promise((resolve) => {
          if (sceneEl.hasLoaded) {
            resolve();
          } else {
            sceneEl.addEventListener("loaded", () => resolve(), { once: true });
          }
        });

      // MindARシステムが使えるようになるまで待つ（最大 約5秒）
      const waitForMindarSystem = async () => {
        for (let i = 0; i < 50; i++) {
          const system = sceneEl.systems["mindar-image-system"];
          if (system) return system;
          await wait(100);
        }
        throw new Error("MindARの初期化がタイムアウトしました。");
      };

      // (4) カメラ起動を最大3回までリトライする
      const startWithRetry = async (maxAttempts = 3) => {
        const mindarSystem = await waitForMindarSystem();
        let lastError;
        for (let attempt = 1; attempt <= maxAttempts; attempt++) {
          try {
            console.log(`[ZINE WebAR] カメラ起動を試行します（${attempt}/${maxAttempts}回目）。`);
            await mindarSystem.start();
            return; // 成功したら終了
          } catch (error) {
            lastError = error;
            console.warn(`[ZINE WebAR] ${attempt}回目の起動に失敗しました。`, error);
            // 次の試行の前に、確保しかけたカメラを必ず解放しておく
            try {
              await mindarSystem.stop();
            } catch (_) {
              /* stop自体の失敗は無視してよい */
            }
            if (attempt < maxAttempts) await wait(600); // 少し待ってから再試行
          }
        }
        throw lastError; // すべて失敗
      };

      startButton.addEventListener("click", async () => {
        // (2) 多重タップ・多重起動を防ぐ
        if (isStarting || isStarted) return;
        isStarting = true;
        startButton.disabled = true;
        startButton.textContent = "起動中…";

        try {
          // (3) シーンの初期化を待ってから
          await waitForSceneReady();
          // (4) リトライ付きでカメラ＆画像認識を開始する
          await startWithRetry(3);

          // 起動に成功したら、スタート画面を消す
          isStarted = true;
          startOverlay.style.display = "none";
          console.log("[ZINE WebAR] ARを開始しました。写真にカメラをかざしてください。");
        } catch (error) {
          // 数回試しても失敗した場合は、分かりやすく案内して再挑戦できるようにする
          console.error(
            "[ZINE WebAR] ARの開始に失敗しました。カメラの使用が許可されているか確認してください。",
            error
          );
          alert(
            "カメラを起動できませんでした。\n" +
              "・URLが https:// で始まっているか\n" +
              "・カメラの使用が「許可」になっているか\n" +
              "・他のアプリ/タブがカメラを使っていないか\n" +
              "を確認して、もう一度ボタンを押してください。"
          );
          // 再挑戦できるよう、ボタンを元に戻す
          startButton.disabled = false;
          startButton.textContent = "もう一度試す";
        } finally {
          isStarting = false;
        }
      });

      // ---------------------------------------------------------------------
      // 2&3. 各マーカーに「認識」「ロスト」の処理を設定する
      //     ・targetFound … 写真を認識 → その写真に対応する動画を表示・再生
      //     ・targetLost  … 写真が外れた → 動画を一時停止・非表示
      //     マーカーが増えても、このループがそれぞれに同じ処理を割り当てます。
      // ---------------------------------------------------------------------
      targetEntities.forEach((targetEntity, index) => {
        // このマーカーに紐づく動画面(<a-video>)と動画素材(<video>)を取得する
        const videoPlane = targetEntity.querySelector(".ar-video");
        const videoId = videoPlane.getAttribute("data-video");
        const videoEl = document.querySelector("#" + videoId);

        // --- 写真を「認識した」とき ---
        targetEntity.addEventListener("targetFound", () => {
          console.log(`[ZINE WebAR] 写真${index + 1}を認識しました。動画を再生します。`);

          // 動画面を表示する
          videoPlane.setAttribute("visible", "true");

          // 登場アニメーション（フェードイン＋ズームアップ）を再生する。
          // <a-video> に設定した animation__zoom / animation__fade が
          // startEvents: arshow を待っているので、ここで "arshow" を発火させます。
          videoPlane.emit("arshow");

          // 消音を解除して音声をオンにする（要件：muted = false）
          videoEl.muted = false;

          // 動画を再生する
          const playPromise = videoEl.play();
          if (playPromise !== undefined) {
            playPromise.catch((error) => {
              // まれに音声付き再生がブロックされた場合は、消音で再生だけは続行する
              console.warn(
                "[ZINE WebAR] 音声付きの再生がブロックされました。消音で再生を継続します。",
                error
              );
              videoEl.muted = true;
              videoEl.play();
            });
          }
        });

        // --- 写真がカメラから「外れた」とき ---
        targetEntity.addEventListener("targetLost", () => {
          console.log(`[ZINE WebAR] 写真${index + 1}が見えなくなりました。動画を一時停止します。`);

          // 動画を一時停止する（要件：pause）
          videoEl.pause();

          // 動画面を非表示にする
          videoPlane.setAttribute("visible", "false");

          // 登場アニメーションを初期状態に戻しておく（次に認識したとき、
          // また小さい＆透明の状態からアニメーションが始まるようにするため）
          videoPlane.setAttribute("scale", "0.7 0.7 0.7");
          videoPlane.setAttribute("material", "opacity", 0);

          // 次に認識したときに、また消音状態から始まらないように消音へ戻しておく
          videoEl.muted = true;
        });
      });

      // ---------------------------------------------------------------------
      // 4. その他：カメラやライブラリ関連のエラーをコンソールに出力する
      // ---------------------------------------------------------------------
      sceneEl.addEventListener("arError", (event) => {
        console.error("[ZINE WebAR] ARエラーが発生しました。", event);
      });
    </script>
  </body>
</html>
